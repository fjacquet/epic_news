name: CI Tests and Checks

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Stub .env with sentinel test values
      # CI must NEVER use real API keys for tests. pyproject.toml already
      # injects the same sentinel values via pytest-env; this .env covers
      # any code path that bypasses pytest and reads .env directly.
      run: |
         cat > .env <<'ENVEOF'
         POSTHOG_DISABLED=1
         OPENROUTER_API_KEY=ci_stub_openrouter
         OPENAI_API_KEY=ci_stub_openai
         OPENAI_MODEL_NAME=test-model
         COMPOSIO_API_KEY=ci_stub_composio
         RAPIDAPI_KEY=ci_stub_rapidapi
         MAIL=ci-test@example.com
         EPIC_ENABLE_EMAIL=false
         ENVEOF

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install the latest version of uv and activate the environment
      uses: astral-sh/setup-uv@v8.1.0
      with:
        activate-environment: true
        enable-cache: true
        prune-cache: false

    - name: Install dependencies using Makefile
      run: make dev

    - name: Run linting checks using Makefile
      run: make lint

    - name: Run type checking with mypy
      run: uv run mypy src/epic_news

    - name: Run tests with coverage using Makefile
      run: make coverage

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: fjacquet/epic_news
        fail_ci_if_error: false
