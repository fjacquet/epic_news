# OSV-Scanner vulnerability allowlist.
# Each entry MUST carry a reason and SHOULD carry an ignoreUntil review date.
# Format: https://google.github.io/osv-scanner/configuration/
#
# Template for new entries:
# [[IgnoredVulns]]
# id = "GHSA-xxxx-xxxx-xxxx"
# ignoreUntil = 2026-09-01
# reason = "<why this is safe/unavoidable; when to re-evaluate>"

[[IgnoredVulns]]
id = "GHSA-f4j7-r4q5-qw2c"  # CVE-2026-45829 — chromadb pre-auth RCE (CVSS 9.3)
ignoreUntil = 2026-09-07
reason = """
Critical code-injection in ChromaDB's network SERVER API \
(/api/v2/.../collections with trust_remote_code), affecting chromadb 1.0.0-1.5.9 \
with NO patched version available. epic_news does not run a ChromaDB server and \
does not import chromadb directly (0 imports); it is a forced transitive dependency \
of crewai (chromadb~=1.1.0) used only as an embedded library, so the vulnerable \
network endpoint is never exposed. Re-evaluate when chromadb ships a fix or crewai \
relaxes the pin."""

[[IgnoredVulns]]
id = "GHSA-xf7x-x43h-rpqh"  # json_repair circular JSON Schema $ref unbounded CPU DoS (High 7.5); no CVE/PYSEC aliases per OSV
ignoreUntil = 2026-09-07
reason = """
High DoS in json-repair <0.60.1 via circular $ref. json-repair is a forced \
transitive dependency of crewai (~=0.25.2 pin) used to repair LLM JSON output; \
no patched version is resolvable until crewai relaxes the pin — `uv lock` with a \
json-repair>=0.60.1 floor fails against crewai 1.15.1/1.15.2. Re-evaluate when \
crewai's json-repair requirement allows >=0.60.1."""

[[IgnoredVulns]]
id = "GHSA-p4gq-832x-fm9v"  # CVE-2026-54293 — nltk path traversal in nltk.data.load() (CVSS 7.5)
ignoreUntil = 2026-09-07
reason = """
URL-encoded path traversal in nltk.data.load() via the nltk: URL scheme \
(decode-after-check flaw) allowing arbitrary local file read. Affects ALL nltk \
versions through 3.9.4 with NO patched version available. nltk is a forced \
transitive dependency (pulled via crewai/langchain) — epic_news has 0 direct \
nltk imports and never calls nltk.data.load() on attacker-controlled nltk:-scheme \
paths, so the traversal sink is unreachable. Re-evaluate when nltk ships a fix or \
the transitive dependency is dropped."""

[[IgnoredVulns]]
id = "PYSEC-2026-597"  # Same nltk vulnerability as GHSA-p4gq-832x-fm9v / CVE-2026-54293, republished by OSV under a PYSEC id not linked as an alias
ignoreUntil = 2026-09-07
reason = """
Duplicate OSV record for the nltk.data.load() path traversal already accepted \
above (GHSA-p4gq-832x-fm9v): osv-scanner only auto-filters ids listed as aliases, \
and this PYSEC record is not cross-linked, so it must be ignored explicitly. \
Same assessment applies: no patched nltk exists, epic_news never calls \
nltk.data.load(), sink unreachable. Re-evaluate with the GHSA entry."""
