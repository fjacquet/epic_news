<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ report_title }}</title>
  <script>
    // Initialize theme on page load
    (function() {
      // Check for saved theme preference, then system preference
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');

      // Apply theme immediately to prevent flash of unstyled content
      document.documentElement.setAttribute('data-theme', theme);

      // Update meta theme-color for mobile browsers
      const themeColor = theme === 'dark' ? '#1a1a1a' : '#f8f9fa';
      let metaThemeColor = document.querySelector('meta[name="theme-color"]');
      if (!metaThemeColor) {
        metaThemeColor = document.createElement('meta');
        metaThemeColor.name = 'theme-color';
        document.head.appendChild(metaThemeColor);
      }
      metaThemeColor.content = themeColor;
    })();

    // Toggle theme function
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

      // Update theme
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);

      // Update meta theme-color
      const themeColor = newTheme === 'dark' ? '#1a1a1a' : '#f8f9fa';
      document.querySelector('meta[name="theme-color"]').content = themeColor;
    }
  </script>
  <style id="theme-styles">
{{ theme_css_vars }}

{{ static_css }}
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <span>Toggle Theme</span>
  </button>

  <div class="container">
    <h1>{{ report_title }}</h1>
    {% if generation_date %}
    <div class="date-info">
      <p>Généré le {{ generation_date }}</p>
    </div>
    {% endif %}

    {{ report_body|safe }}

    <div class="footer">
      <p>Ce rapport a été généré automatiquement par Epic News.</p>
    </div>
  </div>
</body>
</html>
